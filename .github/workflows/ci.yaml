# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "develop" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Install chrome
        run: |
          wget http://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_147.0.7727.137-1_amd64.deb
          sudo apt update
          sudo apt install ./google-chrome-stable_147.0.7727.137-1_amd64.deb --allow-downgrades -y

      - name: Start application
        run: node src/app.js 

      - name: Run Jest
        run: npm test
  
  delivery:
    runs-on: ubuntu-latest
    
    needs: build
    if: ${{ success() }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0  # Traz todo o histórico

      - name: Set up Git
        run: |
          git config --global user.email "flaris.feller@gmail.com"
          git config --global user.name "Flaris Feller"

      - name: Fetch all branches
        run: git fetch --all
      
      - name: Checkout and merge
        run: |
          git checkout main
          git merge origin/develop --allow-unrelated-histories --no-edit  # Use 'origin/develop' explicitamente
          git push origin main
